        </div>

    <!-- Main Content -->
    <main class="container">
        <!-- Contact Section -->
        <section id="contact" class="section">
            <div class="contact-grid">
                <div class="contact-info">
                    <h2 class="contact-title">CONTACT ME</h2>
                    <p class="contact-tagline">I'm currently available for freelance work or full-time opportunities.
                        Let's build something brutal.</p>

                    <div class="contact-details">
                        <div class="contact-item">
                            <span class="contact-icon">&#9993;</span>
                            <a href="mailto:shashwatkarna6@gmail.com">shashwatkarna6@gmail.com</a>
                        </div>
                        <div class="contact-item">
                            <span class="contact-icon">&#128205;</span>
                            <span>New Delhi, India</span>
                        </div>
                    </div>

                    <div class="social-links">
                        <a href="https://linkedin.com/in/shashwatkarna/" class="social-icon border shadow-hover" target="_blank">IN</a>
                        <a href="https://github.com/shashwatkarna" class="social-icon border shadow-hover" target="_blank">GH</a>
                        <a href="https://x.com/shashwat_karna" class="social-icon border shadow-hover" target="_blank">TW</a>
                        <a href="https://leetcode.com/u/intervuln/" class="social-icon border shadow-hover" target="_blank">LC</a>
                        <a href="https://instagram.com/karn_shashwat" class="social-icon border shadow-hover" target="_blank">IG</a>
                        <a href="https://peerlist.io/shashwhat" class="social-icon border shadow-hover" target="_blank">PL</a>
                    </div>
                </div>

                <div class="contact-form-container">
                    <form action="https://formspree.io/f/xjgavevg" method="POST" class="contact-form border shadow" id="contact-form">
                        <div class="form-group">
                            <label for="name">NAME</label>
                            <input type="text" id="name" name="name" placeholder="ENTER YOUR NAME"
                                class="input-field border" required>
                        </div>

                        <div class="form-group">
                            <label for="email">EMAIL</label>
                            <input type="email" id="email" name="email" placeholder="ENTER YOUR EMAIL"
                                class="input-field border" required>
                        </div>

                        <div class="form-group">
                            <label for="message">MESSAGE</label>
                            <textarea id="message" name="message" rows="5" placeholder="TYPE YOUR MESSAGE HERE..."
                                class="input-field border" required></textarea>
                        </div>

                        <button type="submit" class="button-submit border shadow-hover">SEND MESSAGE</button>
                    </form>
                    <div id="form-status" style="margin-top: 20px; font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; display: none;"></div>
                </div>
            </div>
        </section>
